name: DouYin Spark Flow Schedule Run
on:
  workflow_dispatch: # 允许手动触发
  schedule: # 定时任务
    - cron: "0 1 * * *" # 每天 1:00 UTC（对应北京时间 9:00）
jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Test Douyin Accessibility
      run: |
        curl -I https://creator.douyin.com/
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps --only-shell
    - name: Export Github Environment Variables and Secrets to JSON
      env:
        PROXY_ADDRESS: ${{ vars.PROXY_ADDRESS }}
        MESSAGE_TEMPLATE: ${{ vars.MESSAGE_TEMPLATE }}
        HITOKOTO_TYPES: ${{ vars.HITOKOTO_TYPES }}
        BROWSER_TIMEOUT: ${{ vars.BROWSER_TIMEOUT }}
        FRIEND_LIST_WAIT_TIME: ${{ vars.FRIEND_LIST_WAIT_TIME }}
        TASK_RETRY_TIMES: ${{ vars.TASK_RETRY_TIMES }}
        LOG_LEVEL: ${{ vars.LOG_LEVEL }}
        TASKS: ${{ vars.TASKS }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_task_cookies.py
    - name: Run DouYin Spark Flow
      run: python main.py
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1